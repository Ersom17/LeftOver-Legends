name: leftover_legends
description: IngredientConservo — track your pantry, reduce food waste, earn Seeds.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  appwrite: ^17.0.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Local storage (works in browser)
  shared_preferences: ^2.2.3

  # Barcode scanning (web-compatible v5)
  mobile_scanner: ^5.2.3

  # Product lookup by barcode
  openfoodfacts: ^3.9.0

  # Unique IDs for items
  uuid: ^4.4.0

  # Icons
  cupertino_icons: ^1.0.6

  image_picker: ^1.1.2
  image: ^4.2.0

  # Opening external URLs (YouTube / recipe search)
  url_launcher: ^6.2.6

  # Mascot tour visuals
  flutter_svg: ^2.0.10+1
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mascot/
