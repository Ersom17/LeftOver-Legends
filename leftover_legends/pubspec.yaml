name: leftover_legends
description: Track your fridge, reduce food waste, earn Seeds.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Local storage (works in browser)
  shared_preferences: ^2.2.3

  # Barcode scanning (web-compatible v5)
  mobile_scanner: ^5.2.3

  # Product lookup by barcode
  openfoodfacts: ^3.9.0

  # Unique IDs for items
  uuid: ^4.4.0

  # Icons
  cupertino_icons: ^1.0.6

  # URL launching (Todo #2 website, #7 recipe links)
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
